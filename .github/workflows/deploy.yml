name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy guardian-site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps: @sveltejs/vite-plugin-svelte@7.0.0 declares
        # peer vite@^8 but the project uses vite@7. Local installs work
        # because npm's default install resolver is more lenient than `npm
        # ci`. Until a version bump aligns the peers, accept the resolution.
        run: npm ci --legacy-peer-deps

      - name: Build site
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 95df39ca1a974c079bc0f48100a78316
          command: pages deploy build --project-name=guardian-site --branch=main --commit-dirty=true
