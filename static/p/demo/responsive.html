<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Responsive harness — 1Context theme</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      flex: 0 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: #111;
      border-bottom: 1px solid #222;
    }
    .toolbar label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: #aaa;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .toolbar select, .toolbar button, .toolbar input {
      background: #1a1a1a;
      color: #e8e8e8;
      border: 1px solid #333;
      padding: 6px 10px;
      border-radius: 4px;
      font: 13px/1 ui-sans-serif, system-ui, sans-serif;
    }
    .toolbar button { cursor: pointer; }
    .toolbar button:hover { border-color: #555; }
    .toolbar .spacer { flex: 1; }
    .toolbar .hint { color: #666; font-size: 11px; font-family: ui-monospace, monospace; }
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 1fr;
      gap: 14px;
      padding: 14px;
      overflow: auto;
      min-height: 0;
    }
    .pane {
      display: flex;
      flex-direction: column;
      background: #161616;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }
    .pane-head {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #0d0d0d;
      border-bottom: 1px solid #222;
      font: 12px/1 ui-monospace, monospace;
    }
    .pane-head .label { color: #f5f5f5; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .pane-head .meta { color: #777; }
    .pane-head .badge { color: #f4a23c; font-weight: 600; }
    .frame-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #fff;
      position: relative;
    }
    .frame-wrap.real-scroll { overflow: auto; }
    iframe {
      display: block;
      border: 0;
      background: #fff;
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Page
      <select id="page">
        <option value="albert-einstein-full.html">Einstein (full Wikipedia)</option>
        <option value="index.html">Index (handcrafted Einstein)</option>
        <option value="components.html">Components reference</option>
        <option value="guardian.html">Guardian Lab Relay</option>
        <option value="guardian-app.html">Guardian app</option>
      </select>
    </label>
    <label>Scale
      <select id="scale">
        <option value="auto" selected>Fit grid (auto)</option>
        <option value="0.5">50%</option>
        <option value="0.66">66%</option>
        <option value="0.85">85%</option>
        <option value="1">100% (real px, scroll)</option>
      </select>
    </label>
    <label>Theme
      <select id="theme">
        <option value="auto">Auto</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </label>
    <button id="reload">Reload all</button>
    <span class="spacer"></span>
    <span class="hint">Edits to css/theme.css hot-reload in every pane.</span>
  </div>
  <div class="grid" id="grid"></div>
  <script>
    const VIEWPORTS = [
      { id: "mobile",  w: 375,  h: 740, label: "Mobile",  desc: "iPhone" },
      { id: "tablet",  w: 768,  h: 980, label: "Tablet",  desc: "iPad portrait" },
      { id: "laptop",  w: 1024, h: 820, label: "Laptop",  desc: "13'' base" },
      { id: "desktop", w: 1440, h: 900, label: "Desktop", desc: "27'' / 15'' MBP" },
    ];

    const grid = document.getElementById("grid");
    const pageSel = document.getElementById("page");
    const scaleSel = document.getElementById("scale");
    const themeSel = document.getElementById("theme");
    const reloadBtn = document.getElementById("reload");

    const params = new URLSearchParams(location.search);
    if (params.has("page")) pageSel.value = params.get("page");
    if (params.has("scale")) scaleSel.value = params.get("scale");
    if (params.has("theme")) themeSel.value = params.get("theme");

    function syncURL() {
      const u = new URL(location.href);
      u.searchParams.set("page", pageSel.value);
      u.searchParams.set("scale", scaleSel.value);
      u.searchParams.set("theme", themeSel.value);
      history.replaceState(null, "", u);
    }

    function applyTheme(iframe) {
      const t = themeSel.value;
      try {
        const doc = iframe.contentDocument;
        if (!doc || !doc.documentElement) return;
        if (t === "auto") doc.documentElement.removeAttribute("data-theme");
        else doc.documentElement.setAttribute("data-theme", t);
      } catch {}
    }

    function build() {
      syncURL();
      grid.innerHTML = "";
      const page = pageSel.value;
      const scaleMode = scaleSel.value;

      const cellW = (grid.clientWidth - 14) / 2 - 2;
      const cellH = (grid.clientHeight - 14) / 2 - 32;

      for (const v of VIEWPORTS) {
        const fitScale = Math.min(cellW / v.w, cellH / v.h, 1);
        const scale = scaleMode === "auto"
          ? fitScale
          : scaleMode === "1" ? 1 : parseFloat(scaleMode);
        const real = scale === 1;

        const pane = document.createElement("div");
        pane.className = "pane";
        pane.innerHTML = `
          <div class="pane-head">
            <span><span class="label">${v.label}</span> <span class="meta">${v.desc}</span></span>
            <span class="meta"><span class="badge">${v.w}px</span> × ${v.h}px${real ? '' : ` · ${(scale * 100).toFixed(0)}%`}</span>
          </div>
          <div class="frame-wrap${real ? ' real-scroll' : ''}"></div>
        `;
        grid.appendChild(pane);

        const wrap = pane.querySelector(".frame-wrap");
        const iframe = document.createElement("iframe");
        iframe.src = page;
        iframe.style.width = v.w + "px";
        iframe.style.height = v.h + "px";
        iframe.style.transform = real ? "none" : `scale(${scale})`;
        iframe.addEventListener("load", () => applyTheme(iframe));
        wrap.appendChild(iframe);
      }
    }

    pageSel.addEventListener("change", build);
    scaleSel.addEventListener("change", build);
    themeSel.addEventListener("change", () => {
      grid.querySelectorAll("iframe").forEach(applyTheme);
      syncURL();
    });
    reloadBtn.addEventListener("click", () => {
      grid.querySelectorAll("iframe").forEach(f => {
        try { f.contentWindow.location.reload(); } catch {}
      });
    });
    let resizeT;
    window.addEventListener("resize", () => {
      clearTimeout(resizeT);
      resizeT = setTimeout(build, 80);
    });
    build();
  </script>
</body>
</html>
